name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_NAME: kmc173/k8s-devops-assistan
  PYTHON_VERSION: "3.12"

jobs:
  quality:
    name: Quality and Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python lint tools
        run: python -m pip install --upgrade ruff

      - name: Run unit tests
        run: make test

      - name: Compile Python modules
        run: python -m compileall k8s_assistant tests

      - name: Run Ruff code checks
        run: ruff check .

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint charts/k8s-devops-assistant

      - name: Render Helm chart
        run: |
          helm template k8s-devops-assistant charts/k8s-devops-assistant \
            --namespace devops-assistant \
            --values charts/k8s-devops-assistant/values-prod.yaml

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Scan source filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Check filesystem scan results
        id: fs_sarif
        if: always()
        run: |
          if [ -f trivy-fs-results.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.fs_sarif.outputs.exists == 'true'
        with:
          sarif_file: trivy-fs-results.sarif

  docker:
    name: Build, Scan, and Push Image
    runs-on: ubuntu-latest
    needs:
      - quality
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Missing Docker Hub secrets. Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in GitHub repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate automatic image version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.${GITHUB_RUN_NUMBER}.0"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "Using image version ${version}"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Scan pushed Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Check image scan results
        id: image_sarif
        if: always()
        run: |
          if [ -f trivy-image-results.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.image_sarif.outputs.exists == 'true'
        with:
          sarif_file: trivy-image-results.sarif
